<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkitt OS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --text-primary: #1a1a2e;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --text-info: #2563eb;
  --text-warning: #d97706;
  --text-success: #059669;
  --text-danger: #dc2626;
  --bg-primary: #ffffff;
  --bg-secondary: #f9fafb;
  --bg-info: #eff6ff;
  --bg-warning: #fffbeb;
  --bg-success: #ecfdf5;
  --bg-danger: #fef2f2;
  --border-secondary: #e5e7eb;
  --border-tertiary: #f3f4f6;
  --border-info: #bfdbfe;
  --border-warning: #fde68a;
  --border-success: #a7f3d0;
  --border-danger: #fecaca;
  --radius-md: 8px;
  --radius-lg: 12px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: #f3f4f6;
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.page-wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 48px; }

/* Float on hover */
.float {
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.float:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
}

.sys-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
.sys-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.6; }

.tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--bg-secondary); padding: 3px; border-radius: var(--radius-md); }
.tab { flex: 1; padding: 10px 6px; text-align: center; border: none; background: transparent; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all .15s; line-height: 1.3; font-family: var(--font-sans); }
.tab.on { background: var(--bg-primary); color: var(--text-primary); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.tab:hover:not(.on) { color: var(--text-primary); }
.tab small { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; opacity: .7; }

.pipe { display: flex; align-items: stretch; gap: 0; margin: 8px 0; flex-wrap: wrap; }
.st { flex: 1; min-width: 85px; padding: 10px 12px; border-radius: var(--radius-md); }
.st-t { font-size: 12.5px; font-weight: 500; margin-bottom: 3px; }
.st-d { font-size: 10.5px; line-height: 1.5; opacity: .8; }
.st-tool { font-size: 9.5px; margin-top: 5px; padding: 2px 7px; border-radius: 4px; display: inline-block; font-weight: 500; }
.ar { display: flex; align-items: center; font-size: 15px; color: var(--text-tertiary); padding: 0 2px; flex-shrink: 0; }

.note { font-size: 10.5px; color: var(--text-secondary); padding: 8px 12px; border-left: 2px solid var(--border-secondary); margin: 9px 0; line-height: 1.55; }
.note strong { color: var(--text-primary); }

.outs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.oc { flex: 1; min-width: 95px; padding: 8px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-tertiary); background: var(--bg-primary); }
.oc-t { font-size: 11.5px; font-weight: 500; }
.oc-d { font-size: 10px; color: var(--text-secondary); margin-top: 2px; line-height: 1.45; }

.badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; display: inline-block; margin-left: 3px; }
.sl { font-size: 10.5px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; color: var(--text-secondary); margin: 14px 0 5px; }

.lw { margin: 9px 0; padding: 12px; border-radius: var(--radius-lg); }
.ll { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.ll .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.fn { font-size: 10.5px; color: var(--text-secondary); margin: 6px 0 6px 4px; }

.ts { display: flex; gap: 5px; flex-wrap: wrap; font-size: 10px; color: var(--text-tertiary); margin-top: 12px; align-items: center; }
.tp { padding: 2px 7px; border-radius: 4px; background: var(--bg-secondary); }

.cmp { margin-top: 14px; padding: 12px; border-radius: var(--radius-lg); border: 0.5px solid var(--border-tertiary); background: var(--bg-secondary); }
.cmp table { width: 100%; font-size: 10.5px; border-collapse: collapse; }
.cmp td { padding: 5px 6px; border-bottom: 0.5px solid var(--border-tertiary); }
.cmp tr:last-child td { border-bottom: none; }
.cmp .hd { font-weight: 500; color: var(--text-secondary); }

.vrc { margin-top: 12px; padding: 10px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-info); background: var(--bg-info); font-size: 11px; line-height: 1.55; color: var(--text-info); }
.vrc strong { font-weight: 500; }

.pool { display: flex; gap: 5px; flex-wrap: wrap; margin: 6px 0; }
.pc { padding: 5px 8px; border-radius: var(--radius-md); border: 0.5px dashed; font-size: 10px; text-align: center; min-width: 60px; flex: 1; }

.lb { margin: 9px 0; padding: 10px 12px; border-radius: var(--radius-md); border: 1px dashed var(--border-secondary); background: var(--bg-secondary); }
.lb-t { font-size: 11.5px; font-weight: 500; margin-bottom: 5px; }
.lb-s { font-size: 10.5px; line-height: 1.7; color: var(--text-secondary); }
.lb-s strong { color: var(--text-primary); }

.rel { margin: 10px 0; padding: 11px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-warning); background: var(--bg-warning); }
.rel-t { font-size: 11.5px; font-weight: 500; color: var(--text-warning); margin-bottom: 5px; }
.rel-d { font-size: 10.5px; line-height: 1.55; color: var(--text-warning); }

.cost { margin: 10px 0; padding: 10px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-success); background: var(--bg-success); }
.cost-t { font-size: 11.5px; font-weight: 500; color: var(--text-success); margin-bottom: 4px; }
.cost-d { font-size: 10.5px; line-height: 1.55; color: var(--text-success); }

.lim { font-size: 10px; margin-top: 6px; padding: 5px 10px; border-radius: var(--radius-md); background: var(--bg-danger); color: var(--text-danger); display: inline-block; line-height: 1.4; }

.dp { margin: 10px 0; padding: 12px; border-radius: var(--radius-lg); border: 0.5px solid var(--border-tertiary); background: var(--bg-secondary); }
.dp-t { font-size: 12px; font-weight: 500; margin-bottom: 8px; }
.dp-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.dp-card { flex: 1; min-width: 130px; padding: 8px 10px; border-radius: var(--radius-md); background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); }
.dp-card-t { font-size: 11px; font-weight: 500; margin-bottom: 3px; }
.dp-card-d { font-size: 10px; color: var(--text-secondary); line-height: 1.45; }

.emoji-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
.emoji-card { padding: 8px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-tertiary); background: var(--bg-primary); flex: 1; min-width: 100px; text-align: center; }
.emoji-icon { font-size: 20px; margin-bottom: 4px; }
.emoji-label { font-size: 10.5px; font-weight: 500; }
.emoji-desc { font-size: 9.5px; color: var(--text-secondary); margin-top: 2px; }

/* Workflow overlay */
.workflow-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.workflow-panel {
  background: #fff; border-radius: 16px; padding: 28px 32px; max-width: 780px; width: 95%;
  max-height: 90vh; overflow-y: auto; position: relative;
  animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.workflow-close {
  position: absolute; top: 14px; right: 16px; background: none; border: none;
  font-size: 20px; cursor: pointer; color: var(--text-tertiary); padding: 4px 8px;
  border-radius: 6px; transition: background 0.15s;
}
.workflow-close:hover { background: var(--bg-secondary); color: var(--text-primary); }

.workflow-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.workflow-sub { font-size: 11px; color: var(--text-secondary); margin-bottom: 20px; }

.wf-row {
  display: flex; align-items: center; gap: 0; margin-bottom: 12px; flex-wrap: wrap;
}
.wf-node {
  padding: 12px 16px; border-radius: 10px; min-width: 110px; text-align: center;
  opacity: 0; transform: translateX(-20px);
  animation: nodeIn 0.4s ease forwards;
}
.wf-node-label { font-size: 11.5px; font-weight: 600; margin-bottom: 2px; }
.wf-node-desc { font-size: 9.5px; opacity: 0.8; line-height: 1.4; }
.wf-node-tool { font-size: 8.5px; margin-top: 4px; opacity: 0.6; font-weight: 500; }

@keyframes nodeIn {
  to { opacity: 1; transform: translateX(0); }
}

.wf-arrow {
  font-size: 18px; color: var(--text-tertiary); padding: 0 6px; flex-shrink: 0;
  opacity: 0; animation: arrowIn 0.3s ease forwards;
}
@keyframes arrowIn { to { opacity: 1; } }

.wf-section { margin-bottom: 22px; }
.wf-section-label {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; padding-left: 2px;
}

.wf-outputs {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
}
.wf-out {
  flex: 1; min-width: 100px; padding: 10px 12px; border-radius: 8px; text-align: center;
  opacity: 0; animation: nodeIn 0.4s ease forwards;
}
.wf-out-label { font-size: 10.5px; font-weight: 600; }
.wf-out-desc { font-size: 9px; opacity: 0.7; margin-top: 2px; }

.wf-divider {
  height: 1px; background: var(--border-secondary); margin: 16px 0;
}

.preview-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-info);
  background: var(--bg-info); color: var(--text-info); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans); transition: all 0.2s;
  margin-top: 10px;
}
.preview-btn:hover {
  background: #dbeafe; border-color: #93c5fd; transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(37,99,235,0.15);
}
.preview-btn svg { width: 14px; height: 14px; }

/* Animated pulse on workflow nodes */
.wf-node.pulse {
  animation: nodeIn 0.4s ease forwards, pulse 2s ease-in-out infinite 0.5s;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 transparent; }
  50% { box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Float wrapper
function Float({ children, className = '', style = {} }) {
  return <div className={`float ${className}`} style={style}>{children}</div>;
}

// Workflow visualization
function WorkflowModal({ build, onClose }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const build1Steps = [
    {
      label: 'Collection',
      nodes: [
        { name: 'Granola', desc: 'Device audio capture', tool: 'All teams', bg: '#f3f4f6', color: '#374151', delay: 0 },
      ]
    },
    {
      label: 'Layer 1: Transpose',
      nodes: [
        { name: 'Claude API', desc: 'Extract commitments, owners, deadlines, OKR links', tool: 'Notion write', bg: '#eff6ff', color: '#2563eb', delay: 0.15 },
        { name: 'Notion DB', desc: 'Structured task rows', tool: 'Database', bg: '#eff6ff', color: '#2563eb', delay: 0.3 },
      ]
    },
    {
      label: 'Layer 2: Orchestrate + Distribute',
      nodes: [
        { name: 'Notion Agent', desc: 'Tag, assign, track, flag blockers (48hr SLA)', tool: '24/7 autonomous', bg: '#fffbeb', color: '#d97706', delay: 0.4 },
        { name: 'Slack Pings', desc: 'Post-meeting actions + morning to-do list', tool: 'Emoji reactions', bg: '#fffbeb', color: '#d97706', delay: 0.55 },
      ]
    },
    {
      label: 'Layer 3: Manager Dossier',
      nodes: [
        { name: 'Claude API', desc: 'Visual team report from Notion snapshot', tool: 'End of day', bg: '#ecfdf5', color: '#059669', delay: 0.65 },
      ]
    },
  ];

  const build1Outputs = [
    { name: 'ICs', desc: 'Action pings + to-do in Slack', bg: '#ecfdf5', color: '#059669', delay: 0.8 },
    { name: 'Managers', desc: 'Visual dossier + OKR progress', bg: '#ecfdf5', color: '#059669', delay: 0.9 },
    { name: 'Ali', desc: 'Red flags + decision queue', bg: '#fef2f2', color: '#dc2626', delay: 1.0 },
  ];

  const build2Steps = [
    {
      label: 'Collection + Extraction (unified)',
      nodes: [
        { name: 'Quill', desc: 'Record, transcribe, extract locally on-device', tool: 'MCP to Notion', bg: '#f3f4f6', color: '#374151', delay: 0 },
        { name: 'Notion DB', desc: 'Structured rows via MCP (no API call)', tool: 'Database', bg: '#eff6ff', color: '#2563eb', delay: 0.15 },
      ]
    },
    {
      label: 'Orchestrate + Distribute',
      nodes: [
        { name: 'Notion Agent', desc: 'Same foundation: tag, assign, track, flag', tool: '24/7 autonomous', bg: '#fffbeb', color: '#d97706', delay: 0.3 },
        { name: 'Slack Pings', desc: 'Post-meeting actions + morning to-do list', tool: 'Emoji reactions', bg: '#fffbeb', color: '#d97706', delay: 0.45 },
      ]
    },
    {
      label: 'Manager Dossier (Claude\'s only job)',
      nodes: [
        { name: 'Claude API', desc: 'Visual team report (7 calls/day flat)', tool: 'End of day', bg: '#ecfdf5', color: '#059669', delay: 0.55 },
      ]
    },
    {
      label: 'Ali\'s Office OS',
      nodes: [
        { name: 'Chief AI', desc: 'Pre-briefs, relationship intel, priority dashboard', tool: 'Purpose-built', bg: '#fef2f2', color: '#dc2626', delay: 0.65 },
      ]
    },
  ];

  const build2Outputs = [
    { name: 'ICs', desc: 'Same Slack experience', bg: '#ecfdf5', color: '#059669', delay: 0.8 },
    { name: 'Managers', desc: 'Visual dossier (same)', bg: '#ecfdf5', color: '#059669', delay: 0.9 },
    { name: 'Ali', desc: 'Chief AI Office OS', bg: '#fef2f2', color: '#dc2626', delay: 1.0 },
  ];

  const steps = build === 0 ? build1Steps : build2Steps;
  const outputs = build === 0 ? build1Outputs : build2Outputs;

  return (
    <div className="workflow-overlay" onClick={onClose}>
      <div className="workflow-panel" onClick={e => e.stopPropagation()}>
        <button className="workflow-close" onClick={onClose}>&times;</button>
        <div className="workflow-title">
          {build === 0 ? 'Build 1 Workflow' : 'Build 2 Workflow'}
        </div>
        <div className="workflow-sub">
          {build === 0
            ? 'Granola captures, Claude transposes, Notion Agent orchestrates, Claude generates dossiers'
            : 'Quill captures + extracts locally, Notion Agent orchestrates, Claude generates dossiers, Chief AI powers Ali\'s OS'}
        </div>

        {steps.map((section, si) => (
          <div className="wf-section" key={si}>
            <div className="wf-section-label" style={{ color: section.nodes[0]?.color || '#374151' }}>
              {section.label}
            </div>
            <div className="wf-row">
              {section.nodes.map((node, ni) => (
                <React.Fragment key={ni}>
                  {ni > 0 && (
                    <div className="wf-arrow" style={{ animationDelay: `${node.delay - 0.05}s` }}>&#8594;</div>
                  )}
                  <div
                    className="wf-node pulse"
                    style={{
                      background: node.bg,
                      color: node.color,
                      border: `1px solid ${node.color}22`,
                      animationDelay: `${node.delay}s`,
                    }}
                  >
                    <div className="wf-node-label">{node.name}</div>
                    <div className="wf-node-desc">{node.desc}</div>
                    <div className="wf-node-tool">{node.tool}</div>
                  </div>
                </React.Fragment>
              ))}
            </div>
            {si < steps.length - 1 && (
              <div style={{ textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 16, margin: '4px 0' }}>&#8595;</div>
            )}
          </div>
        ))}

        <div className="wf-divider" />
        <div className="wf-section-label" style={{ color: '#059669', marginBottom: 8 }}>Outputs</div>
        <div className="wf-outputs">
          {outputs.map((out, i) => (
            <div
              key={i}
              className="wf-out"
              style={{
                background: out.bg,
                color: out.color,
                border: `1px solid ${out.color}22`,
                animationDelay: `${out.delay}s`,
              }}
            >
              <div className="wf-out-label">{out.name}</div>
              <div className="wf-out-desc">{out.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [showWorkflow, setShowWorkflow] = useState(false);

  return (
    <div className="page-wrap">
      <div className="sys-title">Inkitt OS</div>
      <div className="sys-sub">The operating system I would build as CoS to replace Ali as the human router, so he only exercises judgment on things that genuinely require it.</div>

      {/* Design Principles */}
      <Float>
        <div className="dp">
          <div className="dp-t">System design principles</div>
          <div className="dp-grid">
            {[
              { t: 'Lossy at each level', d: 'Every layer filters. ICs see all their tasks. Managers see team patterns. Ali sees red flags only. Information compresses as it moves up, never expands.' },
              { t: 'Cost-effective performance', d: "Minimize expensive API calls. Use local processing and native tool intelligence where possible. Build 2 cuts Claude API costs to a flat 6 calls/day regardless of meeting volume." },
              { t: 'Fewer, familiar tools', d: 'Everyone already uses Slack and Notion. I build on top of existing habits, not against them. No new apps for ICs to learn. Adoption by default.' },
              { t: 'Minimize platform jumping', d: "ICs never leave Slack. Managers get dossiers in Slack. Ali gets his roll-up in Slack or his Office OS. Nobody opens Notion to update a task status." },
              { t: 'Proactive and reactive', d: "Proactive: morning to-do lists, end-of-day dossiers, pre-briefs before Ali's meetings. Reactive: post-meeting action pings immediately after every call, blocker escalations triggered by SLA breach." },
            ].map((p, i) => (
              <Float key={i}>
                <div className="dp-card">
                  <div className="dp-card-t">{p.t}</div>
                  <div className="dp-card-d">{p.d}</div>
                </div>
              </Float>
            ))}
          </div>
        </div>
      </Float>

      {/* Tabs */}
      <div className="tabs">
        <button className={`tab ${tab === 0 ? 'on' : ''}`} onClick={() => setTab(0)}>
          Build 1: Now<small>Notion Agent + Slack / First 60 days</small>
        </button>
        <button className={`tab ${tab === 1 ? 'on' : ''}`} onClick={() => setTab(1)}>
          Build 2: Next<small>Quill + Chief AI / Month 3-6</small>
        </button>
      </div>

      {/* Preview Workflow Button */}
      <button className="preview-btn" onClick={() => setShowWorkflow(true)}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
        </svg>
        Preview Workflow
      </button>

      {showWorkflow && <WorkflowModal build={tab} onClose={() => setShowWorkflow(false)} />}

      {/* BUILD 1 */}
      {tab === 0 && (
        <div>
          {/* Collection */}
          <Float>
            <div className="lw" style={{ background: 'var(--bg-secondary)', border: '0.5px solid var(--border-tertiary)' }}>
              <div className="ll" style={{ color: 'var(--text-secondary)' }}><span className="dot" style={{ background: 'var(--text-secondary)' }} />Collection: how everyone's meetings pool</div>
              <div className="st-d">Every team member across Inkitt, Galatea, and CandyJar runs Granola on their device. No bot. Captures device audio on any platform.</div>
              <div className="pool">
                {['Product','Engineering','Content','GTM','Data','BizOps'].map(t => (
                  <Float key={t}><div className="pc" style={{ borderColor: 'var(--border-info)', color: 'var(--text-info)' }}>{t}</div></Float>
                ))}
              </div>
              <div className="fn">Granola shared folders pool by team + auto-push every note to my Notion workspace</div>
            </div>
          </Float>

          {/* Transpose */}
          <Float>
            <div className="lw" style={{ background: 'var(--bg-info)', border: '0.5px solid var(--border-info)' }}>
              <div className="ll" style={{ color: 'var(--text-info)' }}><span className="dot" style={{ background: 'var(--text-info)' }} />Layer 1: Transpose<span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-info)' }}>Claude's only job here</span></div>
              <div className="pipe">
                <div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-info)', flex: 2 }}>
                  <div className="st-t" style={{ color: 'var(--text-info)' }}>Granola notes to Notion structured rows</div>
                  <div className="st-d">When a new meeting note lands in Notion, Claude extracts: commitments, owners, deadlines, team tags, dependencies, and OKR links. Writes each as a structured row in my Notion task database. Claude does not orchestrate, does not distribute. Transpose only.</div>
                  <div className="st-tool" style={{ background: 'var(--bg-info)', color: 'var(--text-info)' }}>Claude API to Notion</div>
                </div>
              </div>
            </div>
          </Float>

          <div className="fn">Notion Agent takes over from here: orchestration, distribution, and signal detection</div>

          {/* Notion Agent */}
          <Float>
            <div className="lw" style={{ background: 'var(--bg-warning)', border: '0.5px solid var(--border-warning)' }}>
              <div className="ll" style={{ color: 'var(--text-warning)' }}><span className="dot" style={{ background: 'var(--text-warning)' }} />Layer 2: Orchestrate + distribute</div>
              <div className="pipe">
                <div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-warning)', flex: 2 }}>
                  <div className="st-t" style={{ color: 'var(--text-warning)' }}>My Notion Custom Agent</div>
                  <div className="st-d">Configured with an instruction page encoding my CoS logic: how I tag teams, assign owners, what constitutes an escalation, my communication standards. Runs 24/7: tags, assigns, tracks blockers with 48hr SLA, flags OKR status.</div>
                  <div className="st-tool" style={{ background: 'var(--bg-warning)', color: 'var(--text-warning)' }}>Notion Custom Agent<span className="badge" style={{ background: 'var(--bg-success)', color: 'var(--text-success)' }}>24/7</span></div>
                </div>
                <div className="ar">&gt;</div>
                <div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-warning)' }}>
                  <div className="st-t" style={{ color: 'var(--text-warning)' }}>My audit</div>
                  <div className="st-d">I spot-check the agent's tagging, verify escalations. My role: auditor + strategist, not router.</div>
                </div>
              </div>
              <div className="outs" style={{ marginTop: 6 }}>
                <Float><div className="oc" style={{ maxWidth: 150 }}><div className="oc-t">Team Brain</div><div className="oc-d">Institutional knowledge that survives 150 to 400 scale</div></div></Float>
                <Float><div className="oc" style={{ maxWidth: 150 }}><div className="oc-t">OKR tracker</div><div className="oc-d">Auto-updated. Agent flags amber/red.</div></div></Float>
                <Float><div className="oc" style={{ maxWidth: 170 }}><div className="oc-t">Blocker registry</div><div className="oc-d">48hr SLA. Auto-escalates on miss.</div></div></Float>
              </div>
            </div>
          </Float>

          {/* Post-meeting ping */}
          <Float>
            <div className="lb">
              <div className="lb-t">Post-meeting action ping (immediately after each call)</div>
              <div className="lb-s">
                <strong>Trigger:</strong> As soon as Claude finishes transposing a meeting's notes into Notion, my Notion Agent detects the new rows and immediately pings each teammate in Slack with the action items they were assigned on that call.<br/>
                <strong>Format:</strong> Each action item is a separate Slack message: task description, deadline, dependencies, and the meeting it came from.<br/>
                <strong>Teammate responds with one of three emoji reactions:</strong>
              </div>
              <div className="emoji-row">
                {[
                  { icon: '\u2705', label: 'Done', desc: 'Task completed. Notion Agent marks status as "done" in Notion.' },
                  { icon: '\u274C', label: 'Remove', desc: 'Not my action item or incorrectly assigned. Notion Agent deletes or flags for my review.' },
                  { icon: '\u2757', label: 'Blocked', desc: 'I am blocked on this. Notion Agent updates status to "blocked" and adds to the blocker registry with a 48hr SLA.' },
                ].map((e, i) => (
                  <Float key={i}>
                    <div className="emoji-card">
                      <div className="emoji-icon">{e.icon}</div>
                      <div className="emoji-label">{e.label}</div>
                      <div className="emoji-desc">{e.desc}</div>
                    </div>
                  </Float>
                ))}
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-secondary)' }}>All three reactions are detected by Notion Agent's native Slack emoji triggers and auto-update the Notion database. No custom bot, no middleware. This is both proactive (ping right after the meeting) and reactive (teammate signals status in real time).</div>
            </div>
          </Float>

          {/* Morning to-do */}
          <Float>
            <div className="lb">
              <div className="lb-t">Morning to-do list (daily at start of day)</div>
              <div className="lb-s">
                <strong>Morning:</strong> My Notion Agent compiles all open tasks for each IC (from post-meeting pings and any carryover) and posts a consolidated daily to-do list to their Slack channel.<br/>
                <strong>During the day:</strong> Same three emoji reactions: &#x2705; done, &#x274C; remove, &#x2757; blocked. All auto-sync to Notion.<br/>
                <strong>End of day:</strong> Completion data feeds into the manager dossier snapshot.
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-secondary)', marginTop: 5 }}>Two touchpoints per day: immediate post-meeting pings (reactive) + morning consolidated list (proactive). ICs never leave Slack. Notion stays perfectly in sync.</div>
            </div>
          </Float>

          <div className="fn">Manager layer: Claude comes back for the visual dossier</div>

          {/* Manager dossier */}
          <Float>
            <div className="lw" style={{ background: 'var(--bg-success)', border: '0.5px solid var(--border-success)' }}>
              <div className="ll" style={{ color: 'var(--text-success)' }}><span className="dot" style={{ background: 'var(--text-success)' }} />Layer 3: Manager dossier<span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-success)' }}>Claude's second job</span></div>
              <div className="pipe">
                <div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-success)', flex: 2 }}>
                  <div className="st-t" style={{ color: 'var(--text-success)' }}>Visual team report</div>
                  <div className="st-d">End of day, Claude reads Notion snapshot: team to-dos (done/open/blocked), linked OKRs per item, progress toward each OKR, unresolved blockers with age. Generates a visual doc managers can scan in 30 seconds.</div>
                  <div className="st-tool" style={{ background: 'var(--bg-success)', color: 'var(--text-success)' }}>Claude API to Slack</div>
                </div>
              </div>
              <div className="outs">
                <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-success)' }}>ICs get</div><div className="oc-d">Post-meeting action pings + morning to-do list. React with emoji. Never leave Slack.</div></div></Float>
                <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-success)' }}>Managers get</div><div className="oc-d">Visual dossier: to-dos, done/open/blocked, OKR links, progress bars, blockers, dependencies</div></div></Float>
                <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-success)' }}>Ali gets</div><div className="oc-d">Executive roll-up: all 6 teams, red flags only, OKR progress, decision queue. Verified by me.</div></div></Float>
              </div>
            </div>
          </Float>

          {/* Ali's Office OS */}
          <Float>
            <div className="lw" style={{ background: 'var(--bg-danger)', border: '0.5px solid var(--border-danger)' }}>
              <div className="ll" style={{ color: 'var(--text-danger)' }}><span className="dot" style={{ background: 'var(--text-danger)' }} />Ali's Office OS (built manually in Build 1)</div>
              <div className="pipe">
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}><div className="st-t" style={{ color: 'var(--text-danger)' }}>Agent-drafted pre-brief</div><div className="st-d">Notion Agent pulls relationship data + past meetings, drafts 1-pager. I review and finalize.</div></div></Float>
                <div className="ar">&gt;</div>
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}><div className="st-t" style={{ color: 'var(--text-danger)' }}>Ali's meeting</div><div className="st-d">Prepared, decides faster</div></div></Float>
                <div className="ar">&gt;</div>
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}><div className="st-t" style={{ color: 'var(--text-danger)' }}>Action memo</div><div className="st-d">Decisions, owners, deadlines fed back to task registry and accountability loop</div></div></Float>
              </div>
            </div>
          </Float>

          {/* Responsibilities */}
          <Float>
            <div className="note"><strong>Inkitt OS responsibility split (Build 1):</strong><br/><strong>Claude</strong> (2 jobs): Transpose Granola to Notion rows. Generate visual manager dossier.<br/><strong>Notion Agent</strong> (everything else): Tag, assign, track, flag, post-meeting pings, morning to-dos, detect emoji reactions (done/remove/blocked), update Notion, draft pre-briefs.<br/><strong>Me:</strong> Audit, verify escalations, finalize Ali's Office OS, own the accountability loop.</div>
          </Float>

          <div className="sl">Failure modes I have designed against</div>
          <div className="outs">
            <Float><div className="oc" style={{ background: 'var(--bg-danger)', borderColor: 'var(--border-danger)' }}><div className="oc-t" style={{ color: 'var(--text-danger)' }}>Compounding errors</div><div className="oc-d"><em>I audit everything before Ali sees it.</em></div></div></Float>
            <Float><div className="oc" style={{ background: 'var(--bg-warning)', borderColor: 'var(--border-warning)' }}><div className="oc-t" style={{ color: 'var(--text-warning)' }}>Alert fatigue</div><div className="oc-d"><em>Lossy layers. I curate ruthlessly.</em></div></div></Float>
            <Float><div className="oc" style={{ background: 'var(--bg-warning)', borderColor: 'var(--border-warning)' }}><div className="oc-t" style={{ color: 'var(--text-warning)' }}>Gaming</div><div className="oc-d"><em>Cross-reference multiple signals.</em></div></div></Float>
            <Float><div className="oc" style={{ background: 'var(--bg-info)', borderColor: 'var(--border-info)' }}><div className="oc-t" style={{ color: 'var(--text-info)' }}>Emoji adoption</div><div className="oc-d"><em>Three reactions are zero-friction. I demo it Week 3.</em></div></div></Float>
          </div>

          <div className="sl">My rollout</div>
          <div className="outs">
            <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-info)' }}>Week 1 to 2: Manual discovery</div><div className="oc-d">Attend every standup. Prepare briefs and digests myself using different tools to build intuition on what information is most relevant for managers as I design the dossier dashboard. Build trust with every team lead. Map the real information topology.</div></div></Float>
            <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-warning)' }}>Week 3 to 4: Agent pilot</div><div className="oc-d">Notion Agent live with one team. Validate tagging, test post-meeting pings and emoji reactions, tune instruction page.</div></div></Float>
            <Float><div className="oc"><div className="oc-t" style={{ color: 'var(--text-success)' }}>Week 5+: Full Inkitt OS</div><div className="oc-d">All 6 teams on the system. Emoji reactions live. Dossiers flowing. I am at the audit + Ali's Office OS layer.</div></div></Float>
          </div>

          <div className="ts"><span style={{ fontWeight: 500 }}>Build 1 stack:</span><span className="tp">Granola</span><span className="tp">Claude API</span><span className="tp">Notion + Custom Agent</span><span className="tp">Slack</span></div>
        </div>
      )}

      {/* BUILD 2 */}
      {tab === 1 && (
        <div>
          <Float>
            <div className="cost">
              <div className="cost-t">Why pursue Build 2?</div>
              <div className="cost-d">In Build 1, Claude makes an API call for every meeting note that lands in Notion (transpose) plus every end-of-day dossier (generation). Across 6 teams with multiple daily meetings each, that is dozens of Claude API calls per day for transposition alone. In Build 2, Quill handles extraction locally on-device. Claude's transpose calls drop to zero. The only remaining API spend is dossier generation: 6 team reports + 1 exec roll-up = 7 calls per day. As Inkitt scales from 150 to 400 people with proportionally more meetings, Build 1's API costs grow linearly with meeting volume. Build 2's costs stay flat. On top of cost savings: Quill adds local-first privacy for sensitive CEO meetings, and Chief AI gives Ali a purpose-built Office OS instead of one I have to build and maintain manually.</div>
            </div>
          </Float>

          <Float>
            <div className="lw" style={{ background: 'var(--bg-secondary)', border: '0.5px solid var(--border-tertiary)' }}>
              <div className="ll" style={{ color: 'var(--text-secondary)' }}><span className="dot" style={{ background: 'var(--text-secondary)' }} />Collection + extraction<span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-secondary)' }}>Quill replaces Granola + Claude transpose</span></div>
              <div className="st-d">Quill on every device. Records, transcribes, AND extracts structured commitments, owners, and deadlines in one local step. Writes directly to my Notion workspace via MCP. All processing on-device. Privacy-first for CEO-level meetings. Claude's transpose job is eliminated entirely.</div>
              <div className="st-tool" style={{ background: 'var(--bg-info)', color: 'var(--text-info)', marginTop: 6 }}>Quill (Quilliam)<span className="badge" style={{ background: 'var(--bg-success)', color: 'var(--text-success)' }}>Local-first</span><span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-info)' }}>All-in-one</span></div>
              <div className="lim">Current limitation: Quill is desktop-only (Mac + Windows). No mobile app yet. Phone calls and in-person meetings without a laptop need a fallback to Granola's iPhone app or manual capture.</div>
            </div>
          </Float>

          <div className="fn">Quill writes to Notion via MCP. No API glue, no Claude call.</div>

          <Float>
            <div className="lw" style={{ background: 'var(--bg-warning)', border: '0.5px solid var(--border-warning)' }}>
              <div className="ll" style={{ color: 'var(--text-warning)' }}><span className="dot" style={{ background: 'var(--text-warning)' }} />Orchestrate + distribute (same foundation as Build 1)</div>
              <div className="st-d">Same Notion Agent, same instruction page, same 24/7 orchestration. Post-meeting action pings, morning to-do lists, three-emoji reaction system. Receives richer structured input from Quill's MCP output vs. Claude's parsing in Build 1.</div>
              <div className="st-tool" style={{ background: 'var(--bg-warning)', color: 'var(--text-warning)', marginTop: 5 }}>Notion Custom Agent<span className="badge" style={{ background: 'var(--bg-success)', color: 'var(--text-success)' }}>24/7</span></div>
            </div>
          </Float>

          <Float>
            <div className="lb">
              <div className="lb-t">Same two-touchpoint system as Build 1</div>
              <div className="lb-s"><strong>After each meeting:</strong> Notion Agent pings teammates with action items. <strong>Each morning:</strong> Consolidated to-do list. <strong>Reactions:</strong> &#x2705; done, &#x274C; remove, &#x2757; blocked. All auto-sync to Notion.</div>
            </div>
          </Float>

          <div className="fn">Claude's only remaining job: the visual manager dossier</div>

          <Float>
            <div className="lw" style={{ background: 'var(--bg-success)', border: '0.5px solid var(--border-success)' }}>
              <div className="ll" style={{ color: 'var(--text-success)' }}><span className="dot" style={{ background: 'var(--text-success)' }} />Manager dossier<span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-success)' }}>Claude's only job in Build 2</span></div>
              <div className="st-d">Same as Build 1. Claude reads Notion snapshot, generates visual team reports with OKR progress, sends to managers and my exec roll-up via Slack.</div>
              <div className="st-tool" style={{ background: 'var(--bg-success)', color: 'var(--text-success)', marginTop: 5 }}>Claude API to Slack</div>
            </div>
          </Float>

          <Float>
            <div className="lw" style={{ background: 'var(--bg-danger)', border: '0.5px solid var(--border-danger)' }}>
              <div className="ll" style={{ color: 'var(--text-danger)' }}><span className="dot" style={{ background: 'var(--text-danger)' }} />Ali's Office OS<span className="badge" style={{ background: 'var(--bg-primary)', color: 'var(--text-danger)' }}>Replaces manual build from Build 1</span></div>
              <div className="pipe">
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}>
                  <div className="st-t" style={{ color: 'var(--text-danger)' }}>Scheduling + pre-briefs</div>
                  <div className="st-d">Auto-generated 1-pager: who Ali is meeting, relationship history, context, decision needed</div>
                </div></Float>
                <div className="ar">&gt;</div>
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}>
                  <div className="st-t" style={{ color: 'var(--text-danger)' }}>Relationship intelligence</div>
                  <div className="st-d">Institutional memory: investors, talent, partners, board</div>
                </div></Float>
                <div className="ar">&gt;</div>
                <Float><div className="st" style={{ background: 'var(--bg-primary)', border: '0.5px solid var(--border-danger)' }}>
                  <div className="st-t" style={{ color: 'var(--text-danger)' }}>Priority dashboard</div>
                  <div className="st-d">AI goal tracking. Ali sees what matters without asking.</div>
                </div></Float>
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-danger)', marginTop: 5, paddingLeft: 2 }}>Chief AI is purpose-built for Ali's Office OS. Created by ex-White House and Congress staff for exactly this use case.</div>
              <div className="st-tool" style={{ background: 'var(--bg-danger)', color: 'var(--text-danger)', marginTop: 5 }}>Chief AI (getchief.ai)</div>
            </div>
          </Float>

          <Float>
            <div className="note"><strong>Inkitt OS Build 2: each tool owns one layer:</strong><br/><strong>Quill</strong> = capture + extract (local, replaces Granola + Claude transpose)<br/><strong>Notion Agent</strong> = orchestrate + distribute + emoji reactions (same as Build 1)<br/><strong>Claude</strong> = visual manager dossier only (1 job, down from 2, lower API cost)<br/><strong>Chief AI</strong> = Ali's Office OS<br/><br/>If Quill fails, I fall back to Granola + Claude transpose (Build 1).<br/>If Chief AI fails, I revert to agent-drafted pre-briefs (Build 1).<br/>The foundation does not change.</div>
          </Float>

          <Float>
            <div className="rel">
              <div className="rel-t">Steps I am already taking to bring these tools in-house</div>
              <div className="rel-d">
                <strong>Quill:</strong> This is the tool I mentioned on our last call that already does a lot of what Inkitt OS needs. The co-founder and COO, Yacob Berhane, is a friend. I have been giving him and the team product feedback as they have developed Quilliam. I am currently one of their beta testers and an ambassador for the platform. I was giving Yacob feedback on the MCP integration earlier this week. I have direct founder access to shape how this tool evolves for our use case.
                <br/><br/>
                <strong>Chief AI:</strong> I know the founder, Shannon, through the GSB network. She is an alum who has come to speak in class. I have requested a demo and I am currently demoing Chief AI alongside Quill. I am evaluating both tools in parallel so that by the time I migrate from Build 1 to Build 2, I have already validated the integrations and have a direct line to both founding teams if we need customization.
              </div>
            </div>
          </Float>

          <div className="sl">Risks specific to Build 2</div>
          <div className="outs">
            <Float><div className="oc" style={{ background: 'var(--bg-danger)', borderColor: 'var(--border-danger)' }}><div className="oc-t" style={{ color: 'var(--text-danger)' }}>Early-stage tools</div><div className="oc-d">Quill: seed stage. Chief AI: early. <em>I have direct founder relationships with both. I am shaping the product, not passively adopting.</em></div></div></Float>
            <Float><div className="oc" style={{ background: 'var(--bg-warning)', borderColor: 'var(--border-warning)' }}><div className="oc-t" style={{ color: 'var(--text-warning)' }}>Quill desktop-only</div><div className="oc-d">No mobile app. Phone calls need a fallback. <em>Granola iPhone app covers the gap until Quill ships mobile.</em></div></div></Float>
            <Float><div className="oc" style={{ background: 'var(--bg-info)', borderColor: 'var(--border-info)' }}><div className="oc-t" style={{ color: 'var(--text-info)' }}>Ali adoption</div><div className="oc-d">Chief AI requires Ali to use a new interface. <em>Only introduce after Build 1 trust is established.</em></div></div></Float>
          </div>

          <div className="ts"><span style={{ fontWeight: 500 }}>Build 2 stack:</span><span className="tp">Quill</span><span className="tp">Notion + Agent</span><span className="tp">Claude API</span><span className="tp">Slack</span><span className="tp">Chief AI</span></div>
        </div>
      )}

      {/* Comparison table */}
      <Float>
        <div className="cmp">
          <div style={{ fontSize: 12, fontWeight: 500, marginBottom: 8 }}>Inkitt OS: Build 1 vs. Build 2</div>
          <table>
            <tbody>
              <tr style={{ borderBottom: '1px solid var(--border-secondary)' }}>
                <td className="hd"></td><td className="hd" style={{ color: 'var(--text-warning)' }}>Build 1: Now</td><td className="hd" style={{ color: 'var(--text-success)' }}>Build 2: Next</td>
              </tr>
              {[
                ['Capture','Granola (cloud)','Quill (local-first, desktop-only)'],
                ['Extraction','Claude transposes to Notion','Quill extracts natively via MCP'],
                ['Orchestration','Notion Agent','Notion Agent (same)'],
                ['IC experience','Post-meeting pings + morning list + 3 emoji reactions','Same'],
                ['Manager experience','Claude visual dossier','Claude visual dossier (same)'],
                ["Ali's Office OS",'Agent-drafted + my review','Chief AI (purpose-built)'],
                ["Claude's jobs",'2 (transpose + dossier)','1 (dossier only)'],
                ['Claude API cost','Scales with meeting volume','Flat (7 calls/day)'],
                ['Privacy','Cloud-dependent','Local-first (Quill)'],
                ['My founder access','','Beta tester (Quill/Yacob) + Demoing (Chief AI/Shannon)'],
                ['Tools','4','5 (each purpose-built)'],
                ['My role','Auditor + strategist','Architect'],
                ['Timeline','First 60 days','Month 3 to 6'],
              ].map((row, i) => (
                <tr key={i}><td className="hd">{row[0]}</td><td>{row[1]}</td><td>{row[2]}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </Float>

      <Float>
        <div className="vrc">
          <strong>Proof point:</strong> Vercel built a Notion Custom Agent that grades and rewrites drafts intended for the CEO, using their Chief of Staff's guidance on how to communicate with them. This is my exact system: a CoS encoding their judgment into an autonomous agent, already working in production at a scaling tech company.
        </div>
      </Float>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
