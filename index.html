<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkitt OS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-info: #2563eb;
  --color-text-warning: #d97706;
  --color-text-success: #059669;
  --color-text-danger: #dc2626;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f9fafb;
  --color-background-info: #eff6ff;
  --color-background-warning: #fffbeb;
  --color-background-success: #ecfdf5;
  --color-background-danger: #fef2f2;
  --color-border-secondary: #e5e7eb;
  --color-border-tertiary: #f3f4f6;
  --color-border-info: #bfdbfe;
  --color-border-warning: #fde68a;
  --color-border-success: #a7f3d0;
  --color-border-danger: #fecaca;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: #f3f4f6;
  color: var(--color-text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.page-wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 48px; }

/* Float on hover */
.float {
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
  border-radius: var(--border-radius-md);
}
.float:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
}

.sys-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
.sys-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 18px; line-height: 1.6; }
.divider { height: 1px; background: var(--color-border-tertiary); margin: 18px 0; }

/* SVG styles */
svg .th { font-family: var(--font-sans); font-size: 12px; font-weight: 500; fill: var(--color-text-primary); }
svg .ts { font-family: var(--font-sans); font-size: 10px; fill: var(--color-text-secondary); }
svg .arr { stroke: var(--color-text-tertiary); stroke-width: 1; }
svg .c-gray rect { fill: var(--color-background-secondary); stroke: var(--color-border-secondary); }
svg .c-gray text { fill: var(--color-text-secondary); }
svg .c-teal rect { fill: var(--color-background-info); stroke: var(--color-border-info); }
svg .c-teal text { fill: var(--color-text-info); }
svg .c-purple rect { fill: var(--color-background-warning); stroke: var(--color-border-warning); }
svg .c-purple text { fill: var(--color-text-warning); }
svg .c-coral rect { fill: var(--color-background-danger); stroke: var(--color-border-danger); }
svg .c-coral text { fill: var(--color-text-danger); }

.tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--color-background-secondary); padding: 3px; border-radius: var(--border-radius-md); }
.tab { flex: 1; padding: 10px 6px; text-align: center; border: none; background: transparent; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); transition: all .15s; line-height: 1.3; font-family: var(--font-sans); }
.tab.on { background: var(--color-background-primary); color: var(--color-text-primary); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.tab:hover:not(.on) { color: var(--color-text-primary); }
.tab small { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; opacity: .7; }

.pipe { display: flex; align-items: stretch; gap: 0; margin: 8px 0; flex-wrap: wrap; }
.st { flex: 1; min-width: 85px; padding: 10px 12px; border-radius: var(--border-radius-md); }
.st-t { font-size: 12.5px; font-weight: 500; margin-bottom: 3px; }
.st-d { font-size: 10.5px; line-height: 1.5; opacity: .8; }
.st-tool { font-size: 9.5px; margin-top: 5px; padding: 2px 7px; border-radius: 4px; display: inline-block; font-weight: 500; }
.ar { display: flex; align-items: center; font-size: 15px; color: var(--color-text-tertiary); padding: 0 2px; flex-shrink: 0; }

.note { font-size: 10.5px; color: var(--color-text-secondary); padding: 8px 12px; border-left: 2px solid var(--color-border-secondary); margin: 9px 0; line-height: 1.55; }
.note strong { color: var(--color-text-primary); }
.note a { color: var(--color-text-info); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

.outs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.oc { flex: 1; min-width: 95px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.oc-t { font-size: 11.5px; font-weight: 500; }
.oc-d { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.45; }

.badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; display: inline-block; margin-left: 3px; }
.sl { font-size: 10.5px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; color: var(--color-text-secondary); margin: 14px 0 5px; }

.lw { margin: 9px 0; padding: 12px; border-radius: var(--border-radius-lg); }
.ll { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.ll .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.fn { font-size: 10.5px; color: var(--color-text-secondary); margin: 6px 0 6px 4px; }
.fn a { color: var(--color-text-info); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

.ts-row { display: flex; gap: 5px; flex-wrap: wrap; font-size: 10px; color: var(--color-text-tertiary); margin-top: 12px; align-items: center; }
.tp { padding: 2px 7px; border-radius: 4px; background: var(--color-background-secondary); }
.tp a { color: inherit; text-decoration: none; }

.cmp { margin-top: 14px; padding: 12px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.cmp table { width: 100%; font-size: 10.5px; border-collapse: collapse; }
.cmp td { padding: 5px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.cmp tr:last-child td { border-bottom: none; }
.cmp .hd { font-weight: 500; color: var(--color-text-secondary); }
.cmp a { color: var(--color-text-info); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

.vrc { margin-top: 12px; padding: 10px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-info); background: var(--color-background-info); font-size: 11px; line-height: 1.55; color: var(--color-text-info); }
.vrc strong { font-weight: 500; }

.pool { display: flex; gap: 5px; flex-wrap: wrap; margin: 6px 0; }
.pc { padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px dashed; font-size: 10px; text-align: center; min-width: 60px; flex: 1; }

.lb { margin: 9px 0; padding: 10px 12px; border-radius: var(--border-radius-md); border: 1px dashed var(--color-border-secondary); background: var(--color-background-secondary); }
.lb-t { font-size: 11.5px; font-weight: 500; margin-bottom: 5px; }
.lb-s { font-size: 10.5px; line-height: 1.7; color: var(--color-text-secondary); }
.lb-s strong { color: var(--color-text-primary); }

.rel { margin: 10px 0; padding: 11px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-warning); background: var(--color-background-warning); }
.rel-t { font-size: 11.5px; font-weight: 500; color: var(--color-text-warning); margin-bottom: 5px; }
.rel-d { font-size: 10.5px; line-height: 1.55; color: var(--color-text-warning); }
.rel-d a { color: var(--color-text-warning); font-weight: 600; }

.cost { margin: 10px 0; padding: 10px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-success); background: var(--color-background-success); }
.cost-t { font-size: 11.5px; font-weight: 500; color: var(--color-text-success); margin-bottom: 4px; }
.cost-d { font-size: 10.5px; line-height: 1.55; color: var(--color-text-success); }
.cost-d a { color: var(--color-text-success); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

.lim { font-size: 10px; margin-top: 6px; padding: 5px 10px; border-radius: var(--border-radius-md); background: var(--color-background-warning); color: var(--color-text-warning); display: inline-block; line-height: 1.4; }
.lim a { color: var(--color-text-warning); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

.dp { margin: 10px 0; padding: 12px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.dp-t { font-size: 12px; font-weight: 500; margin-bottom: 8px; }
.dp-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.dp-card { flex: 1; min-width: 130px; padding: 8px 10px; border-radius: var(--border-radius-md); background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); }
.dp-card-t { font-size: 11px; font-weight: 500; margin-bottom: 3px; }
.dp-card-d { font-size: 10px; color: var(--color-text-secondary); line-height: 1.45; }

.emoji-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
.emoji-card { padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); flex: 1; min-width: 100px; text-align: center; }
.emoji-icon { font-size: 20px; margin-bottom: 4px; }
.emoji-label { font-size: 10.5px; font-weight: 500; }
.emoji-desc { font-size: 9.5px; color: var(--color-text-secondary); margin-top: 2px; }

.insight-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.insight-card { flex: 1; min-width: 130px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.insight-card-t { font-size: 10.5px; font-weight: 500; margin-bottom: 2px; }
.insight-card-d { font-size: 9.5px; color: var(--color-text-secondary); line-height: 1.4; }

/* Workflow overlay */
.workflow-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.workflow-panel {
  background: #fff; border-radius: 16px; padding: 28px 32px; max-width: 800px; width: 95%;
  max-height: 90vh; overflow-y: auto; position: relative;
  animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 25px 60px rgba(0,0,0,0.18);
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.workflow-close {
  position: absolute; top: 14px; right: 16px; background: none; border: none;
  font-size: 20px; cursor: pointer; color: var(--color-text-tertiary); padding: 4px 8px;
  border-radius: 6px; transition: background 0.15s;
}
.workflow-close:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }

.workflow-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.workflow-sub { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 20px; line-height: 1.5; }

.wf-section { margin-bottom: 16px; }
.wf-section-label {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; padding-left: 2px;
}
.wf-row { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
.wf-node {
  padding: 12px 16px; border-radius: 10px; min-width: 110px; text-align: center;
  opacity: 0; transform: translateX(-20px);
  animation: nodeIn 0.4s ease forwards;
}
.wf-node-label { font-size: 11.5px; font-weight: 600; margin-bottom: 2px; }
.wf-node-desc { font-size: 9.5px; opacity: 0.8; line-height: 1.4; }
.wf-node-tool { font-size: 8.5px; margin-top: 4px; opacity: 0.6; font-weight: 500; }
@keyframes nodeIn { to { opacity: 1; transform: translateX(0); } }

.wf-arrow {
  font-size: 18px; color: var(--color-text-tertiary); padding: 0 6px; flex-shrink: 0;
  opacity: 0; animation: arrowIn 0.3s ease forwards;
}
@keyframes arrowIn { to { opacity: 1; } }

.wf-down { text-align: center; color: var(--color-text-tertiary); font-size: 16px; margin: 4px 0; opacity: 0; animation: arrowIn 0.3s ease forwards; }

.wf-outputs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.wf-out {
  flex: 1; min-width: 100px; padding: 10px 12px; border-radius: 8px; text-align: center;
  opacity: 0; animation: nodeIn 0.4s ease forwards;
}
.wf-out-label { font-size: 10.5px; font-weight: 600; }
.wf-out-desc { font-size: 9px; opacity: 0.7; margin-top: 2px; }

.wf-divider { height: 1px; background: var(--color-border-secondary); margin: 16px 0; }

.wf-node.pulse { animation: nodeIn 0.4s ease forwards, pulse 2s ease-in-out infinite 0.6s; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 transparent; }
  50% { box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
}

.preview-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--color-border-info);
  background: var(--color-background-info); color: var(--color-text-info); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans); transition: all 0.2s;
  margin-top: 10px;
}
.preview-btn:hover {
  background: #dbeafe; border-color: #93c5fd; transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(37,99,235,0.15);
}
.preview-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function Float({ children, className = '', style = {} }) {
  return <div className={`float ${className}`} style={style}>{children}</div>;
}

/* ==================== WORKFLOW MODAL ==================== */
function WorkflowModal({ build, onClose }) {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const build1 = [
    { label: 'Layer 0: Meetings > Collection', color: '#6b7280', nodes: [
      { name: 'Granola', desc: 'Device audio capture across all 6 teams', tool: 'No bot, any platform', bg: '#f9fafb', color: '#374151', delay: 0 },
    ]},
    { label: 'Layer 1: Transcripts > Commitments (Transpose)', color: '#2563eb', nodes: [
      { name: 'Claude API', desc: 'Extract commitments, owners, deadlines, OKR links', tool: 'Claude job 1 of 3', bg: '#eff6ff', color: '#2563eb', delay: 0.15 },
      { name: 'Notion DB', desc: 'Structured task rows', tool: 'Database', bg: '#eff6ff', color: '#2563eb', delay: 0.3 },
    ]},
    { label: 'Layer 2: Commitments > Execution Tracking', color: '#d97706', nodes: [
      { name: 'Notion Agent', desc: 'Tag, assign, track blockers (48hr SLA), flag OKRs', tool: '24/7 autonomous', bg: '#fffbeb', color: '#d97706', delay: 0.4 },
      { name: 'Slack Pings', desc: 'Post-meeting actions + morning to-do + emoji reactions', tool: '\u2705 \u274C \u2757', bg: '#fffbeb', color: '#d97706', delay: 0.55 },
    ]},
    { label: 'Layer 3: Escalation via Manager Dossier', color: '#059669', nodes: [
      { name: 'Claude API', desc: 'Visual team report from Notion snapshot', tool: 'Claude job 2 of 3', bg: '#ecfdf5', color: '#059669', delay: 0.65 },
    ]},
    { label: 'Layer 4: Org Health Intelligence', color: '#1a1a2e', nodes: [
      { name: 'Notion Agent', desc: 'Weekly/monthly pattern scan across teams', tool: 'Pattern detection', bg: '#f9fafb', color: '#374151', delay: 0.75 },
      { name: 'Claude API', desc: 'Narrative Org Health Report with trends', tool: 'Claude job 3 of 3', bg: '#eff6ff', color: '#2563eb', delay: 0.9 },
    ]},
  ];

  const build1Outputs = [
    { name: 'ICs', desc: 'Action pings + to-do in Slack', bg: '#ecfdf5', color: '#059669', delay: 1.0 },
    { name: 'Managers', desc: 'Visual dossier + OKR progress', bg: '#ecfdf5', color: '#059669', delay: 1.1 },
    { name: 'Team Leads', desc: 'Weekly Org Health (individual data)', bg: '#eff6ff', color: '#2563eb', delay: 1.2 },
    { name: 'Ali', desc: 'Red flags + monthly Org Health (structural)', bg: '#fef2f2', color: '#dc2626', delay: 1.3 },
  ];

  const build2 = [
    { label: 'Layer 0+1: Meetings > Transcripts > Commitments (unified)', color: '#6b7280', nodes: [
      { name: 'Quill', desc: 'Record, transcribe, extract locally on-device', tool: 'Replaces Granola + Claude transpose', bg: '#f9fafb', color: '#374151', delay: 0 },
      { name: 'Notion DB', desc: 'Structured rows via MCP (no API call)', tool: 'Local-first', bg: '#eff6ff', color: '#2563eb', delay: 0.15 },
    ]},
    { label: 'Layer 2: Commitments > Execution Tracking (same)', color: '#d97706', nodes: [
      { name: 'Notion Agent', desc: 'Same foundation: tag, assign, track, flag, pattern scan', tool: '24/7 autonomous', bg: '#fffbeb', color: '#d97706', delay: 0.3 },
      { name: 'Slack Pings', desc: 'Post-meeting actions + morning to-do + emoji reactions', tool: '\u2705 \u274C \u2757', bg: '#fffbeb', color: '#d97706', delay: 0.45 },
    ]},
    { label: 'Layer 3+4: Dossier + Org Health (Claude\'s only jobs)', color: '#059669', nodes: [
      { name: 'Claude API', desc: 'Daily dossier + weekly/monthly Org Health Report', tool: '2 jobs (down from 3)', bg: '#ecfdf5', color: '#059669', delay: 0.55 },
    ]},
    { label: 'Ali\'s Office OS', color: '#dc2626', nodes: [
      { name: 'Chief AI', desc: 'Pre-briefs, relationship intel, priority dashboard', tool: 'Purpose-built', bg: '#fef2f2', color: '#dc2626', delay: 0.65 },
    ]},
  ];

  const build2Outputs = [
    { name: 'ICs', desc: 'Same Slack experience', bg: '#ecfdf5', color: '#059669', delay: 0.8 },
    { name: 'Managers', desc: 'Visual dossier (same)', bg: '#ecfdf5', color: '#059669', delay: 0.9 },
    { name: 'Team Leads', desc: 'Org Health (same, cheaper)', bg: '#eff6ff', color: '#2563eb', delay: 1.0 },
    { name: 'Ali', desc: 'Chief AI Office OS', bg: '#fef2f2', color: '#dc2626', delay: 1.1 },
  ];

  const steps = build === 0 ? build1 : build2;
  const outputs = build === 0 ? build1Outputs : build2Outputs;

  return (
    <div className="workflow-overlay" onClick={onClose}>
      <div className="workflow-panel" onClick={e => e.stopPropagation()}>
        <button className="workflow-close" onClick={onClose}>&times;</button>
        <div className="workflow-title">{build === 0 ? 'Build 1 Workflow' : 'Build 2 Workflow'}</div>
        <div className="workflow-sub">
          {build === 0
            ? 'Granola captures \u2192 Claude transposes \u2192 Notion Agent orchestrates \u2192 Claude generates dossiers + Org Health Reports'
            : 'Quill captures + extracts locally \u2192 Notion Agent orchestrates \u2192 Claude generates dossiers + Org Health \u2192 Chief AI powers Ali\'s OS'}
        </div>
        {steps.map((section, si) => (
          <div className="wf-section" key={si}>
            <div className="wf-section-label" style={{ color: section.color }}>{section.label}</div>
            <div className="wf-row">
              {section.nodes.map((node, ni) => (
                <React.Fragment key={ni}>
                  {ni > 0 && <div className="wf-arrow" style={{ animationDelay: `${node.delay - 0.05}s` }}>&rarr;</div>}
                  <div className="wf-node pulse" style={{ background: node.bg, color: node.color, border: `1px solid ${node.color}22`, animationDelay: `${node.delay}s` }}>
                    <div className="wf-node-label">{node.name}</div>
                    <div className="wf-node-desc">{node.desc}</div>
                    <div className="wf-node-tool">{node.tool}</div>
                  </div>
                </React.Fragment>
              ))}
            </div>
            {si < steps.length - 1 && <div className="wf-down" style={{ animationDelay: `${section.nodes[section.nodes.length-1].delay + 0.1}s` }}>&darr;</div>}
          </div>
        ))}
        <div className="wf-divider" />
        <div className="wf-section-label" style={{ color: '#059669', marginBottom: 8 }}>Outputs (lossy at each level)</div>
        <div className="wf-outputs">
          {outputs.map((out, i) => (
            <div key={i} className="wf-out" style={{ background: out.bg, color: out.color, border: `1px solid ${out.color}22`, animationDelay: `${out.delay}s` }}>
              <div className="wf-out-label">{out.name}</div>
              <div className="wf-out-desc">{out.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ==================== MAIN APP ==================== */
function App() {
  const [tab, setTab] = useState(0);
  const [showWorkflow, setShowWorkflow] = useState(false);

  return (
    <div className="page-wrap">
      <div className="sys-title">Inkitt OS</div>
      <div className="sys-sub">The operating system I would build as Chief of Staff to replace Ali as the human router, so he only exercises judgment on things that genuinely require it.</div>

      {/* ===== SVG INFORMATION FLOW ===== */}
      <Float>
        <svg width="100%" viewBox="0 0 680 420" style={{ marginBottom: 4 }}>
          <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></marker></defs>
          <text className="th" x="340" y="16" textAnchor="middle">Information flow</text>
